# =============================================================
# SynthEdge Nginx Configuration
# Domain: synthedge.xyz / api.synthedge.xyz
#
# This config supports two modes:
#   1. HTTP-only (initial setup, before SSL certs exist)
#   2. HTTPS with Let's Encrypt (after running ssl-setup.sh)
#
# To switch modes: comment/uncomment the SSL server blocks
# and toggle the HTTP redirect vs proxy in the port-80 block.
# =============================================================

# --- CORS origin whitelist ---
map $http_origin $cors_origin {
    default "";
    "https://synthedge.xyz"     $http_origin;
    "https://www.synthedge.xyz" $http_origin;
    "https://app.synthedge.xyz" $http_origin;
}

# --- Upstream definitions ---
upstream frontend_upstream {
    server frontend:3000;
}

upstream backend_upstream {
    server backend:8000;
}

# --- Health check endpoint (used by docker healthcheck) ---
server {
    listen 80;
    server_name localhost;

    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

